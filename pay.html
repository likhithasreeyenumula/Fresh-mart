<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Payment Page</title>
    
        <!-- Bootstrap CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    
        <!-- Bootstrap JS Bundle (includes Popper) -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    
        <style>
            body {
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                background: url('images/bgi2.jpeg') no-repeat center center fixed;
                background-size: cover;
                margin: 0;
                padding: 0;
                color: white;
            }
    
            .container {
                max-width: 600px;
                margin: 50px auto;
                background: rgba(0, 0, 0, 0.8);
                padding: 40px;
                border-radius: 10px;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
                text-align: center;
            }
    
            h1, h2 {
                color: #ffcc00;
            }
    
            ul li {
                padding: 10px;
                background: rgba(255, 255, 255, 0.1);
                margin-bottom: 10px;
                border-radius: 5px;
            }
    
            button {
                background-color: #28a745;
                color: white;
                padding: 10px 20px;
                border: none;
                border-radius: 5px;
                cursor: pointer;
            }
    
            button:hover {
                background-color: #218838;
            }
    
            .payment-details {
                display: none;
            }
    
            .success-message {
                display: none;
                background: #4CAF50;
                color: white;
                padding: 15px;
                margin-top: 20px;
                border-radius: 5px;
            }
    
            @media (max-width: 768px) {
                .container {
                    width: 90%;
                    padding: 20px;
                }
            }
        </style>
    </head>
    
<body>
    <div class="container">
        <h1>Payment</h1>
        <h2>Review Your Cart</h2>
        <ul id="cart-items"></ul>
        <div id="total-amount" class="mb-4">Total: $0.00</div>
        <div>
            <label for="phone">Phone Number:</label>
            <input type="tel" id="phone" class="form-control mb-3" placeholder="Enter phone number" required>

            <label for="address">Address:</label>
            <input type="text" id="address" class="form-control mb-3" placeholder="Enter address" required>
        </div>
        <div>
            <label>Payment Method:</label>
            <div>
                <input type="radio" id="offline" name="payment_method" value="offline" checked>
                <label for="offline">Offline</label>

                <input type="radio" id="online" name="payment_method" value="online">
                <label for="online">Online</label>
            </div>
        </div>

        <div id="onlinePaymentDetails" class="payment-details">
            <h3>Online Payment Details</h3>
            <input type="text" id="otp" class="form-control mb-3" placeholder="Enter OTP">
            <button id="otpBtn">Generate OTP</button><br><br>
        </div>

        <button id="payBtn">Book Now</button>
        <div class="success-message" id="successMessage">
            Payment successful! Redirecting...
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const cartItemsContainer = document.getElementById('cart-items');
            const totalAmountElement = document.getElementById('total-amount');
            let total = 0;
        
            cart.forEach(item => {
                const li = document.createElement('li');
                li.textContent = `${item.name} (x${item.quantity}) - $${(item.price * item.quantity).toFixed(2)}`;
                cartItemsContainer.appendChild(li);
                total += item.quantity * item.price;
            });
        
            totalAmountElement.textContent = `Total: $${total.toFixed(2)}`;
        });
        
        // Handle OTP Generation (4-digit OTP)
document.getElementById('otpBtn').addEventListener('click', () => {
    const generatedOTP = Math.floor(1000 + Math.random() * 9000); // Generates a 4-digit OTP
    alert(`Your OTP is: ${generatedOTP}`);
    localStorage.setItem('generatedOTP', generatedOTP); // Store OTP temporarily
});        
        // Toggle Payment Details
        document.getElementById('online').addEventListener('change', () => {
            document.getElementById('onlinePaymentDetails').style.display = 'block';
        });
        document.getElementById('offline').addEventListener('change', () => {
            document.getElementById('onlinePaymentDetails').style.display = 'none';
        });
        
        // Handle Payment Submission
        document.getElementById('payBtn').addEventListener('click', () => {
            const phone = document.getElementById('phone').value.trim();
            const address = document.getElementById('address').value.trim();
            const paymentMethod = document.querySelector('input[name="payment_method"]:checked').value;
            
            if (!phone || !address) {
                alert('Please fill in all required fields.');
                return;
            }
        
            if (paymentMethod === 'online') {
                const enteredOTP = document.getElementById('otp').value;
                const storedOTP = localStorage.getItem('generatedOTP');
                
                if (!enteredOTP || enteredOTP !== storedOTP) {
                    alert('Invalid OTP. Please enter the correct OTP.');
                    return;
                }
            }
        
            alert('Payment successful!');
            document.getElementById('successMessage').style.display = 'block';
        
            // Save order details before clearing cart
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            localStorage.setItem('orderDetails', JSON.stringify({ cart, phone, address, paymentMethod }));
        
            setTimeout(() => {
                localStorage.removeItem('cart'); // Clear only cart, not order details
                localStorage.removeItem('generatedOTP'); // Clear OTP storage
                window.location.href = 'tq.html';
            }, 2000);
        });
        </script>
        
</body>
</html>
