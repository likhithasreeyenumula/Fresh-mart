<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        body {
            font-family: 'Poppins', Arial, sans-serif;
            background-color: rgba(248, 249, 250, 0.7);
            background: url('images/tq.jpg') no-repeat center center fixed;
            background-size: cover;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
            background-color: rgba(255, 255, 255, 0.518);
        }
        .alert {
            background-color: rgba(123, 177, 171, 0.6);
            color: white;
        }
        .card {
            max-width: 600px;
            margin: auto;
            margin-top: 20px;
            padding: 20px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
            background-color: rgba(61, 233, 236, 0.518);
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div class="text-center">
            <div class="alert alert-success" role="alert">
                <h1 class="display-4">Thank You for Your Order!</h1>
                <p class="lead">Your order has been successfully placed.</p>
            </div>
        </div>
    </div>
    <div class="card">
        <h4 class="text-center">Order Details</h4>
        <table class="table mt-3">
            <thead>
                <tr>
                    <th>Item</th>
                    <th>Quantity</th>
                    <th>Price</th>
                    <th>Total</th>
                </tr>
            </thead>
            <tbody id="orderDetails">
                <!-- Items will be dynamically populated here -->
            </tbody>
        </table>
        <p><strong>Total Price:</strong> $<span id="totalPrice">0</span></p>
        <div class="text-center">
            <a href="cart.html" class="btn btn-primary">Back to Cart</a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const orderData = JSON.parse(localStorage.getItem('orderDetails'));
            
            if (!orderData || !orderData.cart.length) {
                document.getElementById('orderDetails').innerHTML = 
                    `<tr><td colspan="4" class="text-center">No items found in your order.</td></tr>`;
                return;
            }
        
            const { cart, phone, address, paymentMethod } = orderData;
            const orderDetails = document.getElementById('orderDetails');
            const totalPriceElement = document.getElementById('totalPrice');
            let totalPrice = 0;
        
            cart.forEach(item => {
                const itemTotal = item.price * item.quantity;
                totalPrice += itemTotal;
        
                orderDetails.innerHTML += `
                    <tr>
                        <td>${item.name}</td>
                        <td>${item.quantity}</td>
                        <td>$${item.price.toFixed(2)}</td>
                        <td>$${itemTotal.toFixed(2)}</td>
                    </tr>
                `;
            });
        
            totalPriceElement.textContent = totalPrice.toFixed(2);
        
            // Append Order Summary (Fix for missing element)
            const summaryContainer = document.createElement('div');
            summaryContainer.innerHTML = `
                <div class="card mt-3 p-3">
                    <h4 class="text-center">Customer Details</h4>
                    <p><strong>Phone:</strong> ${phone}</p>
                    <p><strong>Address:</strong> ${address}</p>
                    <p><strong>Payment Method:</strong> ${paymentMethod}</p>
                </div>
            `;
            document.querySelector(".container").appendChild(summaryContainer);
        
            // Clear order details AFTER displaying
            setTimeout(() => {
                localStorage.removeItem('orderDetails');
                console.log("Order details cleared after display.");
            }, 5000);
        });
        </script>
        
</body>
</html>
