<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Fresh Mart Chat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <style>
        body {
            background-image: url('images/grocery.jpg');
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-position: center;
            color: #333;
        }
        .chat-container {
            background: rgba(245, 245, 245, 0.85);
            border-radius: 10px;
            box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        .chat-header {
            background-color: #007bff;
            color: white;
            text-align: center;
            font-size: 1.5rem;
            padding: 15px;
            font-weight: bold;
        }
        .message {
            max-width: 70%;
            padding: 10px;
            border-radius: 20px;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .tenant-message {
            align-self: flex-end;
            background-color: #15c0f3;
            color: white;
        }
        .owner-message {
            align-self: flex-start;
            background-color: white;
            border: 1px solid #ddd;
        }
        .message img {
            border-radius: 50%;
            width: 40px;
            height: 40px;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Fresh Mart</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="fruits.html">Fruits</a></li>
                    <li class="nav-item"><a class="nav-link" href="vegetables.html">Vegetables</a></li>
                    <li class="nav-item"><a class="nav-link" href="dairy.html">Dairy Products</a></li>
                    <li class="nav-item"><a class="nav-link" href="snacks.html">Snacks</a></li>
                </ul>
                <a class="btn btn-light" href="cart.html">🛒 Cart</a>
            </div>
        </div>
    </nav>

    <!-- Chat Section -->
    <div class="container my-4">
        <div class="chat-container p-3">
            <div class="chat-header">Chat with Owner</div>
            <div class="chat-messages d-flex flex-column gap-3 p-3" id="chatMessages">
                <div class="message tenant-message d-flex flex-row-reverse align-items-center">
                    <img src="images/ow.png" alt="Tenant Image">
                    <span>Hi, I have a problem!</span>
                </div>
                <div class="message owner-message d-flex align-items-center">
                    <img src="images/cu.png" alt="Owner Image">
                    <span>Hello, may I know what the problem is?</span>
                </div>
            </div>
            <div class="chat-input d-flex p-3 bg-light border-top">
                <textarea id="chatInput" class="form-control me-2" placeholder="Type a message..."></textarea>
                <button id="sendButton" class="btn btn-primary" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function sendMessage() {
            var chatInput = document.getElementById("chatInput");
            var chatMessages = document.getElementById("chatMessages");
            if (chatInput.value.trim() !== "") {
                var message = document.createElement("div");
                message.className = "message tenant-message d-flex flex-row-reverse align-items-center";
                var img = document.createElement("img");
                img.src = "images/ow.png";
                img.alt = "Tenant Image";
                var messageText = document.createElement("span");
                messageText.textContent = chatInput.value;
                message.appendChild(img);
                message.appendChild(messageText);
                chatMessages.appendChild(message);
                chatMessages.scrollTop = chatMessages.scrollHeight;
                chatInput.value = "";
                setTimeout(function() {
                    var ownerMessage = document.createElement("div");
                    ownerMessage.className = "message owner-message d-flex align-items-center";
                    var ownerImg = document.createElement("img");
                    ownerImg.src = "images/cu.png";
                    ownerImg.alt = "Owner Image";
                    var ownerMessageText = document.createElement("span");
                    ownerMessageText.textContent = "Thank you for your message. I will get back to you shortly.";
                    ownerMessage.appendChild(ownerImg);
                    ownerMessage.appendChild(ownerMessageText);
                    chatMessages.appendChild(ownerMessage);
                    chatMessages.scrollTop = chatMessages.scrollHeight;
                }, 1000);
            }
        }
    </script>
</body>
</html>
